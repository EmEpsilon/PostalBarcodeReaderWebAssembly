<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>カスタマバーコードリーダー WEB</title>
    <base href="/" />
    <link href="css/bootstrap/bootstrap.min.css" rel="stylesheet" />
    <link href="css/app.css" rel="stylesheet" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="PostalBarcodeReaderWebAssembly.styles.css" rel="stylesheet" />
</head>

<body>
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">🗙</a>
    </div>
    <script src="_framework/blazor.webassembly.js" autostart="false"></script>
    <script>
        (() => {
            const loadingProgress = document.querySelector('.loading-progress');
            const loadingText = document.querySelector('.loading-progress-text');

            const showLoadError = () => {
                if (!loadingText) {
                    return;
                }

                loadingProgress?.setAttribute('hidden', 'hidden');
                loadingText.classList.add('load-failed');
                loadingText.innerHTML = '読み込みに失敗しました。<br />ページを再読み込みしてもう一度お試しください。<br /><a href="" onclick="location.reload(); return false;">ページを再読み込みする</a>';
            };

            window.addEventListener('error', (event) => {
                const target = event.target;
                if (target instanceof HTMLScriptElement && target.src.includes('_framework/blazor.webassembly.js')) {
                    showLoadError();
                }
            }, true);

            if (window.Blazor?.start) {
                window.Blazor.start().catch(() => showLoadError());
            } else {
                showLoadError();
            }
        })();
    </script>
    <script src="/js/canvas.js"></script>
    <script src="/js/camera.js"></script>
    <script src="/js/file.js"></script>
    <script src="/js/utils.js"></script>
</body>
</html>
